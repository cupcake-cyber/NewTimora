<div
  class="fixed top-0 right-0 h-full w-96 bg-card border-l border-border shadow-2xl z-50 flex flex-col transition-transform duration-300 translate-x-full"
  [class.translate-x-full]="!open()"
  [class.translate-x-0]="open()"
>

  <div class="flex items-center justify-between px-5 py-4 border-b border-border shrink-0">

    <div>
      <h3 class="font-semibold text-foreground">Notificaciones</h3>

      <p class="text-xs text-muted-foreground">
        {{ unreadCount() }} no leído
      </p>
    </div>

    <button
      (click)="close()"
      class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors"
    >
      ✕
    </button>

  </div>

  <div class="flex-1 min-h-0 overflow-y-auto p-4 space-y-2 noscroll">

    <div
      *ngFor="let n of notifications().slice().reverse(); trackBy: trackById"
      class="rounded-xl p-3.5 flex gap-3 transition-colors border border-border" 
      [ngClass]="n.isRead
        ? 'bg-secondary/50'
        : 'bg-primary/5 border-primary/15'"
    >

      <div
        class="w-8 h-8 rounded-full flex items-center justify-center shrink-0 "
        [ngClass]="n.isRead ? 'bg-purple-800/10' : 'bg-primary/60'"
      >
        <i-lucide
          [name]="iconConfig[n.type]?.name ?? 'bell'"
          size="14"
          [ngClass]="iconConfig[n.type]?.color ?? 'text-gray-400'"
        ></i-lucide>
      </div>

      <div class="flex-1 min-w-0">

        <div class="flex items-start justify-between gap-1.5 mb-1">

          <p class="text-xs text-foreground leading-relaxed">
            {{ n.message }}
          </p>

          <span
            *ngIf="!n.isRead"
            class="w-1.5 h-1.5 rounded-full bg-primary shrink-0 mt-1"
          ></span>

        </div>

        <div class="flex items-center gap-2">

          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-purple-700/15 text-muted-foreground">
            {{ n.type }}
          </span>

          <span class="text-xs text-muted-foreground">
            {{ formatTime(n.createdAt) }}
          </span>

        </div>

      </div>

    </div>

  </div>

</div>
