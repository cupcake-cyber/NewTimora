<div
  class="fixed top-0 right-0 h-full w-96 bg-card border-l border-border shadow-2xl z-50 flex flex-col transition-transform duration-300"
  [class.translate-x-0]="open()"
  [class.translate-x-full]="!open()"
>

  <!-- HEADER -->
  <div class="flex items-center justify-between px-5 py-4 border-b border-border">
    <div>
      <h3 class="font-semibold text-foreground">Notifications</h3>
    </div>

    <button
      (click)="close()"
      class="p-1.5 rounded-lg hover:bg-secondary"
    >
      ✕
    </button>
  </div>

  <!-- BODY -->
  <div class="flex-1 overflow-y-auto p-4 space-y-2">

    <ng-container *ngIf="notifications$ | async as notifications">

      <div
        *ngFor="let n of notifications"
        class="rounded-xl p-3 border border-border bg-card"
      >
        <p class="text-xs text-foreground">
          {{ n.message }}
        </p>

        <div class="text-[10px] text-muted-foreground mt-1">
          {{ n.type }} · {{ n.createdAt }}
        </div>
      </div>

    </ng-container>

  </div>

</div>
