<button
  *ngIf="item.type === 'item'"
  (click)="navigate()"
  class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm font-medium transition-all"
  [ngClass]="{
    'bg-primary/10 text-primary': isActive(),
    'text-sidebar-foreground hover:text-foreground hover:bg-sidebar-accent': !isActive()
  }"
>

  <lucide-icon
    *ngIf="item.icon"
    [img]="item.icon"
    size="18"
    class="transition-colors"
    [ngClass]="{
      'text-primary': isActive(),
      'text-muted-foreground': !isActive()
    }"
  ></lucide-icon>

  <span class="truncate">
    {{ item.label }}
  </span>

</button>
