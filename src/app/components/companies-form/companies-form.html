<div class="overflow-y-auto flex-1 p-6 space-y-3">

  <!-- COMPANY NAME -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Company Name *
    </label>

    <input
      [(ngModel)]="model.name"
      class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
  </div>

  <!-- RUC + PHONE -->
  <div class="grid grid-cols-2 gap-3">

    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        RUC
      </label>

      <input
        [(ngModel)]="model.ruc"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Phone
      </label>

      <input
        [(ngModel)]="model.phone"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

  </div>

  <!-- EMAIL -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Email
    </label>

    <input
      [(ngModel)]="model.email"
      class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
  </div>

  <!-- ADDRESS -->
  <div>
    <label class="block text-xs font-medium text-muted-foreground mb-1.5">
      Address
    </label>

    <input
      [(ngModel)]="model.address"
      class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
  </div>

</div>
