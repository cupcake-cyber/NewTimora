<app-modal
  [open]="open"
  (openChange)="!$event && close.emit()">

  <div class="relative w-full bg-card border border-border rounded-2xl shadow-2xl flex flex-col">


    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">

      <h3 class="font-semibold text-foreground">
        Edit Company
      </h3>


      <button
        (click)="close.emit()"
        class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors">

        ✕

      </button>

    </div>



    <!-- BODY -->
    <div class="overflow-y-auto flex-1 p-6 space-y-3">


      <app-companies-form
        [model]="model">
      </app-companies-form>


    </div>



    <!-- FOOTER -->
    <div class="flex gap-2 justify-end px-6 py-4 border-t border-border">


      <button
        (click)="close.emit()"
        class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground hover:bg-muted">

        Cancel

      </button>



      <button
        (click)="save.emit()"
        class="px-4 py-1.5 text-sm rounded-xl bg-primary text-primary-foreground hover:opacity-90 active:scale-95">

        Save

      </button>


    </div>


  </div>

</app-modal>
