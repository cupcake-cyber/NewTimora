<div
  class="bg-card border border-border rounded-xl p-4 hover:border-primary/20 transition-colors group"
>
  <!-- HEADER -->
  <div class="flex items-start justify-between mb-2">
    <h3 class="text-sm font-semibold text-foreground">
      {{ service.name }}
    </h3>

    <!-- ACTIONS -->
    <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
      <button
        (click)="onEdit()"
        class="inline-flex items-center rounded-xl px-2.5 py-1 text-xs text-muted-foreground hover:text-foreground hover:bg-input-background"
      >
        <lucide-angular [img]="icons.Pencil" class="w-4 h-4"> </lucide-angular>
      </button>

      <button
        (click)="onDelete()"
        class="inline-flex items-center rounded-xl px-2.5 py-1 text-xs text-muted-foreground hover:text-foreground hover:bg-input-background"
      >
        <lucide-angular [img]="icons.Trash2" class="w-4 h-4"> </lucide-angular>
      </button>
    </div>
  </div>

  <!-- DESCRIPTION -->
  <p class="text-xs text-muted-foreground mb-3 leading-relaxed">
    {{ service.description || 'No description' }}
  </p>

  <!-- FOOTER -->
  <div class="flex items-center justify-between">
    <span class="text-sm font-bold text-accent"> S/. {{ service.price.toFixed(2) }} </span>

    <div class="flex items-center gap-2">
      <span
        class="inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium"
        [ngClass]="getStatusClass(service.status)"
      >
        {{ getStatusLabel(service.status) }}
      </span>

      <span class="text-xs text-muted-foreground flex items-center gap-0.5">
        <lucide-angular [img]="icons.Clock" class="w-3 h-3"> </lucide-angular>

        {{ service.duration }}m
      </span>
    </div>
  </div>
</div>
