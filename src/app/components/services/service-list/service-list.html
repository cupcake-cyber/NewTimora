<div *ngIf="services.length === 0" class="text-center py-12">
  <p class="text-muted-foreground">No services found</p>
</div>


<div *ngFor="let supplier of getUniqueSuppliers()">

  <!-- SUPPLIER HEADER -->
  <div class="flex items-center gap-2 mb-3">
    <div
      class="w-7 h-7 rounded-full bg-primary/10 flex items-center justify-center text-xs font-bold text-primary"
    >
      {{ supplier.name.charAt(0) }}
    </div>

    <span class="text-sm font-semibold text-foreground">
      {{ supplier.name }}
    </span>

    <span class="text-xs text-muted-foreground">
      · {{ supplier.specialty || 'Supplier' }}
    </span>

    <span class="text-xs text-muted-foreground ml-auto">
      {{ getServicesBySupplier(supplier.id).length }} services
    </span>
  </div>


  <!-- SERVICES GRID -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">

    <app-service-card
      *ngFor="let service of getServicesBySupplier(supplier.id)"
      [service]="service"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)"
    >
    </app-service-card>

  </div>

</div>
