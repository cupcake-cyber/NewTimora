<app-modal [open]="open" (openChange)="openChange.emit($event)">
  <div
    class="relative w-full max-w-lg bg-card border border-border rounded-2xl shadow-2xl flex flex-col max-h-[88vh]"
  >
    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground">New Service</h3>

      <button
        (click)="close.emit()"
        class="p-1.5 rounded-lg hover:bg-input-background text-muted-foreground hover:text-foreground transition-colors"
      >
        <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
      </button>
    </div>

    <!-- BODY -->
    <div class="overflow-y-auto flex-1 p-6">
      <div class="space-y-4">
        <!-- COMPANY -->
        <div *ngIf="isOwner">
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Company <span class="text-destructive ml-0.5">*</span>
          </label>

          <select
            [(ngModel)]="serviceForm.companyId"
            (ngModelChange)="modalCompanyChange.emit()"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          >
            <option [ngValue]="null" disabled>Select company</option>

            <option *ngFor="let c of companies" [ngValue]="c.id">
              {{ c.name }}
            </option>
          </select>
        </div>

        <!-- SUPPLIER -->
        <div *ngIf="!isUser">
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Supplier <span class="text-destructive ml-0.5">*</span>
          </label>

          <select
            [(ngModel)]="serviceForm.supplierId"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          >
            <option [ngValue]="null" disabled>Select supplier</option>

            <option *ngFor="let s of modalSuppliers" [ngValue]="s.supplier?.id">
              {{ s.person.firstName }}
              {{ s.person.lastName }}
              -
              {{ s.supplier?.specialty || 'Supplier' }}
            </option>
          </select>
        </div>

        <!-- NAME -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Service Name
          </label>

          <input
            [(ngModel)]="serviceForm.name"
            type="text"
            placeholder="e.g Haircut"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          />
        </div>

        <!-- DESCRIPTION -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Description
          </label>

          <textarea
            [(ngModel)]="serviceForm.description"
            rows="2"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          ></textarea>
        </div>

        <!-- PRICE / DURATION -->
        <div class="grid grid-cols-2 gap-3">
          <input
            type="number"
            [(ngModel)]="serviceForm.price"
            placeholder="Price"
            class="bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          />

          <input
            type="number"
            [(ngModel)]="serviceForm.duration"
            placeholder="Duration"
            class="bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          />
        </div>

        <!-- STATUS -->
        <select
          [(ngModel)]="serviceForm.status"
          class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
        >
          <option value="ACTIVE">Active</option>

          <option value="TEMPORARILY_UNAVAILABLE">Temporarily Unavailable</option>

          <option value="ARCHIVED">Archived</option>
        </select>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 pt-2">
          <button (click)="close.emit()" class="px-4 py-1.5 rounded-xl bg-input-background">
            Cancel
          </button>

          <button
            (click)="save.emit()"
            class="px-4 py-1.5 rounded-xl bg-primary text-primary-foreground"
          >
            Create Service
          </button>
        </div>
      </div>
    </div>
  </div>
</app-modal>
