<app-modal
  [open]="open"
  (openChange)="!$event && close.emit()">

  <div class="relative w-full bg-card border border-border rounded-2xl shadow-2xl flex flex-col">


    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border">

      <h3 class="font-semibold text-foreground">
        Delete Company
      </h3>


      <button
        (click)="close.emit()"
        class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors">

        ✕

      </button>

    </div>



    <!-- BODY -->
    <div class="p-6 text-sm text-muted-foreground">

      Are you sure you want to delete

      <span class="text-foreground font-medium">
        {{ company?.name }}
      </span>

      ?

    </div>



    <!-- FOOTER -->
    <div class="flex gap-2 justify-end px-6 py-4 border-t border-border">


      <button
        (click)="close.emit()"
        class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground">

        Cancel

      </button>



      <button
        (click)="confirm.emit()"
        class="px-4 py-1.5 text-sm rounded-xl bg-red-500 text-white hover:opacity-90">

        Delete

      </button>


    </div>


  </div>

</app-modal>
