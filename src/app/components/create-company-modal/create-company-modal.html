<app-modal
  [open]="open"
  (openChange)="!$event && close.emit()"
>

<div class="relative w-full bg-card border border-border rounded-2xl shadow-2xl flex flex-col">
  <!-- HEADER -->
  <div class="flex justify-between px-6 py-4 border-b border-border">
    <h3 class="font-semibold">
      New Company
    </h3>

    <button (click)="close.emit()">
      ✕
    </button>
  </div>

  <!-- FORM -->
  <div class="p-6">
    <app-companies-form
      [model]="model">
    </app-companies-form>
  </div>

  <!-- FOOTER -->
  <div class="flex justify-end gap-2 px-6 py-4 border-t border-border">
    <button
      (click)="close.emit()"
      class="px-4 py-1.5 rounded-xl bg-secondary">
      Cancel
    </button>
    <button
      (click)="save.emit()"
      class="px-4 py-1.5 rounded-xl bg-primary text-primary-foreground">
      Save
    </button>
  </div>
</div>
</app-modal>
