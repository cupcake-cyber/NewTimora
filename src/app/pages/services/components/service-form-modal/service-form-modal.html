<app-modal [open]="open" (openChange)="openChange.emit($event)">
  <div
    class="relative w-full max-w-lg bg-card border border-border rounded-2xl shadow-2xl flex flex-col max-h-[88vh]"
  >
    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground">Nuevo Servicio</h3>

      <button
        (click)="close.emit()"
        class="p-1.5 rounded-lg hover:bg-input-background text-muted-foreground hover:text-foreground transition-colors"
      >
        <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
      </button>
    </div>

    <!-- BODY -->
    <div class="overflow-y-auto flex-1 p-6">
      <div class="space-y-4">
        <!-- COMPANY -->
        <div *ngIf="isOwner">
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Empresa <span class="text-destructive ml-0.5">*</span>
          </label>

          <select
            [(ngModel)]="serviceForm.companyId"
            (ngModelChange)="modalCompanyChange.emit()"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          >
            <option [ngValue]="null" disabled>Seleccionar empresa</option>

            <option *ngFor="let c of companies" [ngValue]="c.id">
              {{ c.name }}
            </option>
          </select>
        </div>

        <!-- SUPPLIER -->
        <div *ngIf="!isUser">
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Proveedor <span class="text-destructive ml-0.5">*</span>
          </label>

          <select
            [(ngModel)]="serviceForm.supplierId"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          >
            <option [ngValue]="null" disabled>Seleccionar proveedor</option>

            <option *ngFor="let s of modalSuppliers" [ngValue]="s.supplier?.id">
              {{ s.person.firstName }}
              {{ s.person.lastName }}
              -
              {{ s.supplier?.specialty || 'Proveedor' }}
            </option>
          </select>
        </div>

        <!-- NAME -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Nombre del Servicio
          </label>

          <input
            [(ngModel)]="serviceForm.name"
            type="text"
            placeholder="Ej: Corte de pelo"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          />
        </div>

        <!-- DESCRIPTION -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Descripción
          </label>

          <textarea
            [(ngModel)]="serviceForm.description"
            rows="2"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          ></textarea>
        </div>

        <!-- PRICE / DURATION -->
        <div class="grid grid-cols-2 gap-3">
          <input
            type="number"
            [(ngModel)]="serviceForm.price"
            placeholder="Precio"
            class="bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          />

          <input
            type="number"
            [(ngModel)]="serviceForm.duration"
            placeholder="Duración"
            class="bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          />
        </div>

        <!-- STATUS -->
        <select
          [(ngModel)]="serviceForm.status"
          class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
        >
          <option value="ACTIVE">Activo</option>

          <option value="TEMPORARILY_UNAVAILABLE">Temporalmente No Disponible</option>

          <option value="ARCHIVED">Archivado</option>
        </select>

        <!-- FOOTER -->
        <div class="flex justify-end gap-2 pt-2">
          <button (click)="close.emit()" class="px-4 py-1.5 rounded-xl bg-input-background">
            Cancelar
          </button>

          <button
            (click)="save.emit()"
            class="px-4 py-1.5 rounded-xl bg-primary text-primary-foreground"
          >
            Crear Servicio
          </button>
        </div>
      </div>
    </div>
  </div>
</app-modal>
