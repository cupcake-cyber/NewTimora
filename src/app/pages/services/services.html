<main class="flex-1 overflow-auto p-6">
  <div class="space-y-6">
    <!-- HEADER -->
    <app-service-header
      [servicesCount]="services.length"
      [canSelectCompany]="canSelectCompany"
      [canSelectSupplier]="canSelectSupplier"
      [companies]="companies"
      [supplierOptions]="supplierOptions"
      [(selectedCompanyId)]="selectedCompanyId"
      [(selectedSupplierId)]="selectedSupplierId"
      [(searchTerm)]="searchTerm"
      (companyChange)="onCompanyChange()"
      (supplierChange)="onSupplierChange()"
      (searchChange)="onSearchChange()"
      (createService)="openCreateModal()"
    ></app-service-header>

    <!-- SERVICES LIST GROUPED BY SUPPLIER -->
    <app-service-list [services]="services" [suppliers]="getUniqueSuppliers()"> </app-service-list>
  </div>
</main>

<!-- ========================= -->
<!-- CREATE SERVICE MODAL -->
<!-- ========================= -->
<app-service-form-modal
  [open]="modalOpen"
  [isOwner]="isOwner"
  [isUser]="isUser"
  [companies]="companies"
  [modalSuppliers]="modalSuppliers"
  [serviceForm]="serviceForm"
  (openChange)="modalOpen = $event"
  (modalCompanyChange)="onModalCompanyChange()"
  (save)="createService()"
  (close)="closeModal()"
>
</app-service-form-modal>
<!-- ========================= -->
<!-- EDIT SERVICE MODAL -->
<!-- ========================= -->
<app-service-edit-modal
  [open]="editModalOpen"
  [editForm]="editForm"
  (save)="updateService()"
  (close)="closeEditModal()"
  (openChange)="editModalOpen = $event"
>
</app-service-edit-modal>

<!-- ========================= -->
<!-- DELETE CONFIRMATION MODAL -->
<!-- ========================= -->
<app-service-delete-modal
  [open]="deleteModalOpen"
  [service]="serviceToDelete"
  (close)="closeDeleteModal()"
  (confirm)="confirmDelete()"
></app-service-delete-modal>
