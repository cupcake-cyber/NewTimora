<main class="flex-1 overflow-auto p-6">
  <div class="space-y-6">

    <!-- FILTER -->
    <app-services-filter
      [companies]="companies"
      [suppliers]="allSuppliers"
      [selectedCompanyId]="selectedCompanyId"
      [selectedSupplierId]="selectedSupplierId"
      [canSelectCompany]="canSelectCompany"
      [canSelectSupplier]="canSelectSupplier"
      [totalServices]="services.length"
      (companyChange)="onCompanyChange($event)"
      (supplierChange)="onSupplierChange($event)"
      (searchChange)="onSearchChange($event)"
      (addClick)="onAddClick()">
    </app-services-filter>

    <!-- LIST -->
    <app-services-list
      [services]="services"
      [allSuppliers]="allSuppliers"
      [loading]="loading"
      (edit)="onEdit($event)"
      (delete)="onDelete($event)">
    </app-services-list>

    <!-- FORM MODAL -->
    <app-services-form
      [(visible)]="showModal"
      [mode]="modalMode"
      [editData]="editData"
      [companies]="companies"
      [suppliers]="allSuppliers"
      [loading]="loading"
      [isOwner]="isOwner"
      [isUser]="isUser"
      [defaultCompanyId]="currentUser?.companyId ?? null"
      [defaultSupplierId]="null"
      (save)="onSave($event)"
      (cancel)="closeModal()">
    </app-services-form>

    <!-- DELETE MODAL -->
    <app-services-delete-modal
      [(visible)]="showDeleteModal"
      [service]="serviceToDelete"
      [loading]="loading"
      (confirm)="confirmDelete()"
      (cancel)="closeDeleteModal()">
    </app-services-delete-modal>

  </div>
</main>
