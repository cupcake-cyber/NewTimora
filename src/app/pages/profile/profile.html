<main class="flex-1 overflow-auto p-6">

  <div class="space-y-6 max-w-2xl">

    <!-- HEADER -->
    <div>
      <h1 class="text-xl font-semibold text-foreground">
        Perfil
      </h1>

      <p class="text-sm text-muted-foreground font-mono">
        {{ userEmail }}
      </p>
    </div>

    <!-- PERSON -->
    <form [formGroup]="profileForm"
      class="bg-card border border-border rounded-2xl p-6 space-y-5">

      <h2 class="text-sm font-semibold text-foreground">
        Información Personal
      </h2>

      <div class="grid grid-cols-2 gap-4">

        <div class="space-y-1">
          <label class="text-xs text-muted-foreground">Nombre</label>
          <app-input formControlName="firstName" placeholder="Nombre"></app-input>
        </div>

        <div class="space-y-1">
          <label class="text-xs text-muted-foreground">Apellido</label>
          <app-input formControlName="lastName" placeholder="Apellido"></app-input>
        </div>

        <div class="space-y-1">
          <label class="text-xs text-muted-foreground">Teléfono</label>
          <app-input formControlName="phone" placeholder="Teléfono"></app-input>
        </div>

        <div class="space-y-1">
          <label class="text-xs text-muted-foreground">Correo de Contacto</label>
          <app-input formControlName="email" placeholder="Correo electrónico" type="email"></app-input>
        </div>

      </div>

      <div class="space-y-1">
        <label class="text-xs text-muted-foreground">Dirección</label>
        <app-input formControlName="address" placeholder="Dirección"></app-input>
      </div>

    </form>

    <!-- SUPPLIER (ONLY IF EXISTS) -->
    <form *ngIf="supplierExists"
      [formGroup]="supplierForm"
      class="bg-card border border-border rounded-2xl p-6 space-y-5">

      <h2 class="text-sm font-semibold text-foreground">
        Proveedor (opcional)
      </h2>

      <div class="space-y-1">
        <label class="text-xs text-muted-foreground">Especialidad</label>
        <app-input formControlName="specialty" placeholder="Especialidad"></app-input>
      </div>

      <div class="space-y-1">
        <label class="text-xs text-muted-foreground">Notas</label>
        <app-input formControlName="notes" placeholder="Notas"></app-input>
      </div>

    </form>

    <!-- SAVE BUTTON (GLOBAL) -->
    <div class="pt-2">
      <app-button type="button" (click)="save()">
        Guardar Cambios
      </app-button>
    </div>

  </div>

</main>
