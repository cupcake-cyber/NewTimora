<app-modal [open]="open" (openChange)="openChange.emit($event)">
  <div
    class="relative w-full max-w-lg bg-card border border-border rounded-2xl shadow-2xl flex flex-col max-h-[88vh]"
  >
    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground">Nuevo Cliente</h3>

      <button
        (click)="close()"
        class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors"
      >
        <lucide-angular [img]="icons.X" class="w-4 h-4"> </lucide-angular>
      </button>
    </div>

    <!-- BODY -->
    <div class="overflow-y-auto flex-1 p-6">
      <div class="space-y-3">
        <!-- COMPANY OWNER -->
        <div *ngIf="canSelectCompany">
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Compañia
            <span class="text-destructive ml-0.5">*</span>
          </label>

          <select
            [(ngModel)]="form.companyId"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm text-foreground focus:outline-none focus:ring-2 focus:ring-primary/30"
          >
            <option [ngValue]="null" disabled>Seleccionar compañia</option>

            <option *ngFor="let c of companies" [ngValue]="c.id">
              {{ c.name }}
            </option>
          </select>
        </div>

        <!-- PERSONAL INFO -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5">
              Nombre *
            </label>

            <input
              [(ngModel)]="form.firstName"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5">
              Apellido*
            </label>

            <input
              [(ngModel)]="form.lastName"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5"> Teléfono </label>

            <input
              [(ngModel)]="form.phone"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5"> Email </label>

            <input
              type="email"
              [(ngModel)]="form.email"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
            />
          </div>
        </div>

        <!-- ADDRESS -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5"> Dirección </label>

          <input
            [(ngModel)]="form.address"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm"
          />
        </div>

        <!-- NOTES -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5"> Notas </label>

          <textarea
            rows="3"
            [(ngModel)]="form.notes"
            placeholder="Client preferences, allergies, notes..."
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm resize-none"
          >
          </textarea>
        </div>

        <!-- FOOTER -->
        <div class="flex gap-2 justify-end pt-2">
          <button
            (click)="close()"
            class="px-4 py-1.5 rounded-xl text-sm bg-secondary text-secondary-foreground hover:bg-muted"
          >
            Cancelar
          </button>

          <button
           (click)="submit()"
            class="px-4 py-1.5 rounded-xl text-sm bg-primary text-primary-foreground hover:opacity-90"
          >
            Guardar Cliente
          </button>
        </div>
      </div>
    </div>
  </div>
</app-modal>
