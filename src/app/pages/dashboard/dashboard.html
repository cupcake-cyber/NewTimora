<app-header
  title="Dasboard"
  [userName]="(user$ | async)?.fullName ?? 'User'">
</app-header>
<div class="space-y-6">

  <!-- CARDS GRID -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

    <div class="p-4 rounded-xl border border-border bg-card">
      <h2 class="font-semibold">Usuarios</h2>
      <p class="text-sm text-muted-foreground">120 activos</p>
    </div>

    <div class="p-4 rounded-xl border border-border bg-card">
      <h2 class="font-semibold">Reservas</h2>
      <p class="text-sm text-muted-foreground">45 hoy</p>
    </div>

    <div class="p-4 rounded-xl border border-border bg-card">
      <h2 class="font-semibold">Ingresos</h2>
      <p class="text-sm text-muted-foreground">$2,450</p>
    </div>

  </div>

</div>
