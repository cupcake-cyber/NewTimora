<main class="flex-1 overflow-auto p-6">

  <div class="space-y-4">

    <!-- HEADER -->
    <div class="flex items-center justify-between">

      <div>
        <h1 class="text-xl font-semibold text-foreground">Companies</h1>
        <p class="text-sm text-muted-foreground">
          {{ filteredCompanies.length }} tenants
        </p>
      </div>

      <div class="flex items-center gap-2">

        <!-- SEARCH -->
        <div class="relative">

          <lucide-angular [img]="icons.Search"
            class="absolute left-1 top-1/2 -translate-y-1/2 text-muted-foreground w-4 h-4">
          </lucide-angular>

          <input [(ngModel)]="search" placeholder="Search companies…"
            class="pl-10 pr-3 py-1.5 text-sm bg-input-background border transition border-border rounded-xl w-44 text-foreground placeholder:text-muted-foreground focus:outline-none focus:ring-2 focus:ring-primary/30" />

        </div>

        <!-- BUTTON -->
        <button (click)="openCreateModal()"
          class="inline-flex items-center rounded-xl font-medium px-4 py-1.5 text-sm gap-1.5 bg-primary text-primary-foreground hover:opacity-90 active:scale-95">

          <lucide-angular [img]="icons.Plus" class="w-4 h-4"></lucide-angular>
          New Company

        </button>

      </div>
    </div>

    <!-- GRID -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">

      <!-- EMPTY -->
      <div *ngIf="filteredCompanies.length === 0" class="text-sm text-muted-foreground">
        No companies found.
      </div>

      <!-- CARD -->
      <div *ngFor="let c of filteredCompanies; trackBy: trackById"
        class="bg-card border border-border rounded-2xl p-5 hover:border-primary/30 transition-all group">

        <!-- TOP -->
        <div class="flex items-start justify-between mb-4">

          <div class="w-12 h-12 rounded-2xl bg-primary/10 flex items-center justify-center">
            <lucide-angular [img]="icons.Building2" class="text-primary w-5 h-5"></lucide-angular>
          </div>

          <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">

            <button (click)="openEditModal(c)" class="p-2 text-muted-foreground hover:text-foreground">
              <lucide-angular [img]="icons.Pencil" class="w-3 h-3"></lucide-angular>
            </button>

            <button (click)="openDeleteModal(c)" class="p-2 text-muted-foreground hover:text-red-500">
              <lucide-angular [img]="icons.Trash2" class="w-3 h-3"></lucide-angular>
            </button>

          </div>
        </div>

        <!-- INFO -->
        <h3 class="font-semibold text-foreground">{{ c.name }}</h3>
        <p class="text-xs text-muted-foreground font-mono">{{ c.ruc }}</p>

        <div class="mt-3 space-y-1.5 text-xs text-muted-foreground">

          <div class="flex items-center gap-2">
            <lucide-angular [img]="icons.MapPin" class="w-3 h-3"></lucide-angular>
            {{ c.address }}
          </div>

          <div class="flex items-center gap-2">
            <lucide-angular [img]="icons.Phone" class="w-3 h-3"></lucide-angular>
            {{ c.phone }}
          </div>

          <div class="flex items-center gap-2">
            <lucide-angular [img]="icons.Mail" class="w-3 h-3"></lucide-angular>
            {{ c.email }}
          </div>

        </div>

        <!-- STATUS -->
        <div class="mt-4">
          <span class="text-xs px-2 py-1 rounded-lg" [ngClass]="{
              'bg-green-500/10 text-green-700': c.status === 'ACTIVE',
              'bg-red-500/10 text-red-700': c.status === 'INACTIVE'
            }">
            {{ c.status }}
          </span>
        </div>

      </div>

    </div>
  </div>
</main>

<!-- ========================= -->
<!-- MODAL -->
<!-- ========================= -->
<app-modal [open]="modalOpen" (openChange)="modalOpen = $event">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">

    <h3 class="font-semibold text-foreground">New Company</h3>

    <button (click)="modalOpen = false"
      class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors">

      <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
    </button>

  </div>

  <!-- BODY -->
  <div class="overflow-y-auto flex-1 p-6 space-y-3">

    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Company Name *
      </label>

      <input [(ngModel)]="form.name"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

    <div class="grid grid-cols-2 gap-3">

      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5">
          RUC
        </label>

        <input [(ngModel)]="form.ruc"
          class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
      </div>

      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5">
          Phone
        </label>

        <input [(ngModel)]="form.phone"
          class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
      </div>

    </div>

    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Email
      </label>

      <input [(ngModel)]="form.email"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Address
      </label>

      <input [(ngModel)]="form.address"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

  </div>

  <!-- FOOTER -->
  <div class="flex gap-2 justify-end px-6 py-4 border-t border-border">

    <button (click)="modalOpen = false" class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground">
      Cancel
    </button>

    <button (click)="createCompany()"
      class="px-4 py-1.5 text-sm rounded-xl bg-primary text-primary-foreground hover:opacity-90">
      Save
    </button>

  </div>

</app-modal>

<app-modal [open]="editModalOpen" (openChange)="editModalOpen = $event">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">

    <h3 class="font-semibold text-foreground">Edit Company</h3>

    <button (click)="closeEditModal()"
      class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors">

      <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
    </button>

  </div>

  <!-- BODY -->
  <div class="overflow-y-auto flex-1 p-6 space-y-3">

    <!-- NAME -->
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Company Name *
      </label>

      <input [(ngModel)]="editForm.name"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

    <!-- RUC + PHONE -->
    <div class="grid grid-cols-2 gap-3">

      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5">
          RUC
        </label>

        <input [(ngModel)]="editForm.ruc"
          class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
      </div>

      <div>
        <label class="block text-xs font-medium text-muted-foreground mb-1.5">
          Phone
        </label>

        <input [(ngModel)]="editForm.phone"
          class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
      </div>

    </div>

    <!-- EMAIL -->
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Email
      </label>

      <input [(ngModel)]="editForm.email"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

    <!-- ADDRESS -->
    <div>
      <label class="block text-xs font-medium text-muted-foreground mb-1.5">
        Address
      </label>

      <input [(ngModel)]="editForm.address"
        class="w-full h-11 px-3 pr-10 rounded-xl border border-border bg-input-background text-foreground placeholder-muted-foreground focus:outline-none focus:ring-2 focus:ring-ring transition" />
    </div>

  </div>

  <!-- FOOTER -->
  <div class="flex gap-2 justify-end px-6 py-4 border-t border-border">

    <button (click)="closeEditModal()"
      class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground hover:bg-muted">

      Cancel
    </button>

    <button (click)="updateCompany()"
      class="px-4 py-1.5 text-sm rounded-xl bg-primary text-primary-foreground hover:opacity-90 active:scale-95">

      Save
    </button>

  </div>

</app-modal>

<app-modal [open]="deleteModalOpen" (openChange)="deleteModalOpen = $event">

<div class="relative w-full  bg-card border border-border rounded-2xl shadow-2xl flex flex-col">

  <!-- HEADER -->
  <div class="flex items-center justify-between px-6 py-4 border-b border-border">
    <h3 class="font-semibold text-foreground">Delete Company</h3>

    <button (click)="closeDeleteModal()">
      <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
    </button>
  </div>

  <!-- BODY -->
  <div class="p-6 text-sm text-muted-foreground">
    Are you sure you want to delete
    <span class="text-foreground font-medium">
      {{ companyToDelete?.name }}
    </span>?
  </div>

  <!-- FOOTER -->
  <div class="flex gap-2 justify-end px-6 py-4 border-t border-border">

    <button (click)="closeDeleteModal()"
      class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground">
      Cancel
    </button>

    <button (click)="confirmDelete()" class="px-4 py-1.5 text-sm rounded-xl bg-red-500 text-white hover:opacity-90">
      Delete
    </button>

  </div>

</div>

</app-modal>
