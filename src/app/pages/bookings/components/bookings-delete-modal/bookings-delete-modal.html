<p-dialog
  [(visible)]="visible"
  (visibleChange)="onVisibleChange($event)"
  [modal]="true"
  [closable]="false"
  [draggable]="false"
  [resizable]="false"
  [style]="{ maxWidth: '450px', width: '100%' }"
  [breakpoints]="{ '960px': '90vw' }"
  [showHeader]="false"
  styleClass="custom-dialog">
  
  <div class="relative w-full bg-card border border-border rounded-2xl shadow-2xl flex flex-col">
    
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground text-lg">Eliminar reserva</h3>
      <button 
        (click)="onCancel()"
        class="p-1.5 rounded-lg hover:bg-secondary text-muted-foreground hover:text-foreground transition-colors cursor-pointer">
        <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
      </button>
    </div>

    <!-- Body -->
    <div class="p-6 text-sm text-muted-foreground">
      ¿Estás seguro de que deseas eliminar la reserva 
      <span class="text-foreground font-medium">"{{ getBookingName() }}"</span>?
      <br>
      <span class="text-xs text-muted-foreground/70">Esta acción no se puede deshacer.</span>
    </div>

    <!-- Footer -->
    <div class="flex gap-2 justify-end px-6 py-4 border-t border-border shrink-0">
      <button
        (click)="onCancel()"
        class="px-4 py-1.5 text-sm rounded-xl bg-secondary text-secondary-foreground hover:bg-secondary/80 transition-colors cursor-pointer">
        Cancelar
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="loading"
        class="px-4 py-1.5 text-sm rounded-xl bg-red-500 text-white hover:opacity-90 active:scale-95 transition-all cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed">
        <span *ngIf="loading" class="inline-block animate-spin mr-1">⏳</span>
        Eliminar
      </button>
    </div>
  </div>
</p-dialog>
