<!-- my-schedule/components/services/components/service-form-modal/service-form-modal.html -->
<app-modal [open]="open" (openChange)="openChange.emit($event)">
  <div
    class="relative w-full max-w-lg bg-card border border-border rounded-2xl shadow-2xl flex flex-col max-h-[88vh]"
  >
    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground">Nuevo Servicio</h3>

      <button
        (click)="onClose()"
        class="p-1.5 rounded-lg hover:bg-input-background text-muted-foreground hover:text-foreground transition-colors"
      >
        <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
      </button>
    </div>

    <!-- BODY -->
    <div class="overflow-y-auto flex-1 p-6">
      <div class="space-y-4">
        <!-- NAME -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Nombre del Servicio <span class="text-destructive ml-0.5">*</span>
          </label>

          <input
            [(ngModel)]="serviceForm.name"
            type="text"
            placeholder="Ej: Corte de pelo"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          />
        </div>

        <!-- DESCRIPTION -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Descripción
          </label>

          <textarea
            [(ngModel)]="serviceForm.description"
            rows="2"
            placeholder="Describe el servicio..."
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30 resize-none"
          ></textarea>
        </div>

        <!-- PRICE / DURATION -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5">
              Precio <span class="text-destructive ml-0.5">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="serviceForm.price"
              placeholder="0.00"
              min="0"
              step="0.01"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
            />
          </div>

          <div>
            <label class="block text-xs font-medium text-muted-foreground mb-1.5">
              Duración (min) <span class="text-destructive ml-0.5">*</span>
            </label>
            <input
              type="number"
              [(ngModel)]="serviceForm.duration"
              placeholder="30"
              min="1"
              step="5"
              class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
            />
          </div>
        </div>

        <!-- STATUS -->
        <div>
          <label class="block text-xs font-medium text-muted-foreground mb-1.5">
            Estado
          </label>
          <select
            [(ngModel)]="serviceForm.status"
            class="w-full bg-input-background border border-border rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary/30"
          >
            <option *ngFor="let option of statusOptions" [value]="option.value">
              {{ option.label }}
            </option>
          </select>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="flex justify-end gap-2 px-6 py-4 border-t border-border shrink-0">
      <button
        (click)="onClose()"
        class="px-4 py-1.5 rounded-xl bg-secondary text-secondary-foreground hover:bg-secondary/80 transition-colors"
      >
        Cancelar
      </button>

      <button
        (click)="onSave()"
        [disabled]="isLoading"
        class="px-4 py-1.5 rounded-xl bg-primary text-primary-foreground hover:opacity-90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="isLoading" class="inline-block animate-spin mr-1">⏳</span>
        Crear Servicio
      </button>
    </div>
  </div>
</app-modal>
