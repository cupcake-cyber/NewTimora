<!-- my-schedule/components/services/components/service-delete-modal/service-delete-modal.html -->
<app-modal [open]="open" (openChange)="openChange.emit($event)">
  <div class="relative w-full bg-card border border-border rounded-2xl shadow-2xl flex flex-col">
    
    <!-- HEADER -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-border shrink-0">
      <h3 class="font-semibold text-foreground">Eliminar Servicio</h3>
      <button
        (click)="onClose()"
        class="p-1.5 rounded-lg hover:bg-input-background text-muted-foreground hover:text-foreground transition-colors"
      >
        <lucide-angular [img]="icons.X" class="w-4 h-4"></lucide-angular>
      </button>
    </div>

    <!-- BODY -->
    <div class="p-6">
      <p class="text-sm text-muted-foreground">
        ¿Estás seguro de que quieres eliminar <span class="text-foreground font-medium">{{ getServiceName() }}</span>?
      </p>
      <p class="text-xs text-muted-foreground/70 mt-1">Esta acción no se puede deshacer.</p>
    </div>

    <!-- FOOTER -->
    <div class="flex gap-2 justify-end px-6 py-4 border-t border-border shrink-0">
      <button
        (click)="onClose()"
        class="px-4 py-1.5 rounded-xl bg-secondary text-secondary-foreground hover:bg-secondary/80 transition-colors"
      >
        Cancelar
      </button>
      <button
        (click)="onConfirm()"
        [disabled]="isLoading"
        class="px-4 py-1.5 rounded-xl bg-destructive text-destructive-foreground hover:opacity-90 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <span *ngIf="isLoading" class="inline-block animate-spin mr-1">⏳</span>
        Eliminar
      </button>
    </div>
  </div>
</app-modal>
