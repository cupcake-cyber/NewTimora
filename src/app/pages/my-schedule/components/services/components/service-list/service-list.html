
<!-- LOADING -->
<div *ngIf="loading" class="flex justify-center py-12">
  <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
</div>

<!-- EMPTY STATE -->
<div *ngIf="!loading && services.length === 0" class="text-center py-12">
  <p class="text-muted-foreground">No se encontraron servicios</p>
</div>

<!-- SERVICES GRID -->
<div *ngIf="!loading && services.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
  <app-service-card
    *ngFor="let service of services; trackBy: trackByServiceId"
    [service]="service"
    [canEdit]="canEdit"
    [canDelete]="canDelete"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)"
  >
  </app-service-card>
</div>
