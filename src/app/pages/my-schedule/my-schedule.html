<!-- my-schedule/my-schedule.html -->
<main class="flex-1 overflow-auto p-6">
  <div class="space-y-4">

    <!-- HEADER -->
    <div>
      <h1 class="text-xl font-semibold text-foreground">Gestionables</h1>
      <p class="text-sm text-muted-foreground">
        Proveedores que gestionas mediante permisos
      </p>
    </div>

    <!-- SUPPLIER SELECTOR -->
    <app-my-schedule-supplier-selector
      [suppliers]="suppliers"
      [selectedSupplierId]="selectedSupplierId"
      [isLoading]="isLoading"
      [error]="error"
      (supplierSelected)="selectSupplier($event)"
      (retry)="onRetry()">
    </app-my-schedule-supplier-selector>

    <!-- ═══════════════════════════════════════════════ -->
    <!-- SECCIÓN DE CONTENIDO - SOLO CUANDO HAY SUPPLIER SELECCIONADO -->
    <!-- ═══════════════════════════════════════════════ -->
    <ng-container *ngIf="!isLoading && selectedSupplier && suppliers.length > 0">

      <!-- SELECTED SUPPLIER INFO -->
      <div class="flex items-center justify-between flex-wrap gap-2">
        <!-- TABS DINÁMICOS -->
        <div class="flex gap-0.5 bg-secondary rounded-xl p-1 w-fit">
          <button
            *ngFor="let tab of availableTabs"
            (click)="setActiveTab(tab.key)"
            class="flex items-center gap-1.5 px-3.5 py-1.5 text-xs font-medium rounded-lg transition-all capitalize"
            [ngClass]="{
              'bg-card text-foreground shadow-sm': activeTab === tab.key,
              'text-muted-foreground hover:text-foreground hover:bg-secondary/50': activeTab !== tab.key
            }">
            <lucide-angular [img]="tab.icon" class="w-3.5 h-3.5"></lucide-angular>
            {{ tab.label }}
          </button>
        </div>

        <!-- PERMISSIONS BADGES - COMPACTOS -->
        <div class="flex items-center gap-1.5 text-xs text-muted-foreground">
          <span class="text-muted-foreground/70 text-[10px]">Perms:</span>
          
          <div class="flex gap-1">
            <!-- Booking -->
            <span *ngIf="hasBookingPermission()" 
                  class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[10px] font-medium bg-blue-500/10 text-blue-400"
                  title="Permisos de reservas">
              📅 B
            </span>

            <!-- Availability -->
            <span *ngIf="hasAvailabilityPermission()" 
                  class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[10px] font-medium bg-emerald-500/10 text-emerald-400"
                  title="Permisos de disponibilidad">
              ⏰ A
            </span>

            <!-- Service -->
            <span *ngIf="hasServicePermission()" 
                  class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[10px] font-medium bg-purple-500/10 text-purple-400"
                  title="Permisos de servicios">
              🔧 S
            </span>

            <!-- Customer -->
            <span *ngIf="hasCustomerPermission()" 
                  class="inline-flex items-center gap-0.5 px-1.5 py-0.5 rounded text-[10px] font-medium bg-amber-500/10 text-amber-400"
                  title="Permisos de clientes">
              👥 C
            </span>
          </div>
          
          <span *ngIf="!hasAnyCategoryPermission()" class="text-muted-foreground/50 text-[10px]">
            Sin permisos
          </span>
        </div>
      </div>

      <!-- CONTENT AREA - BOOKINGS -->
      <div *ngIf="activeTab === 'BOOKINGS'" class="flex flex-col h-full space-y-4">
        <app-bookings
          [supplierId]="selectedSupplierId"
          [companyId]="selectedSupplier.person.companyId"
          [hasCreatePermission]="hasBookingCreate"
          [hasReadPermission]="hasBookingRead"
          [hasUpdatePermission]="hasBookingUpdate"
          [hasDeletePermission]="hasBookingDelete">
        </app-bookings>
      </div>

      <!-- CONTENT AREA - AVAILABILITY -->
      <div *ngIf="activeTab === 'AVAILABILITY'" class="flex flex-col h-full space-y-4">
        <app-availabilities
          [supplierId]="selectedSupplierId"
          [companyId]="selectedSupplier.person.companyId"
          [hasCreatePermission]="hasAvailabilityCreate"
          [hasReadPermission]="hasAvailabilityRead"
          [hasUpdatePermission]="hasAvailabilityUpdate"
          [hasDeletePermission]="hasAvailabilityDelete">
        </app-availabilities>
      </div>

      <!-- CONTENT AREA - SERVICES -->
      <div *ngIf="activeTab === 'SERVICES'" class="flex flex-col h-full space-y-4">
        <app-services
          [supplierId]="selectedSupplierId"
          [companyId]="selectedSupplier.person.companyId"
          [hasCreatePermission]="hasServiceCreate"
          [hasReadPermission]="hasServiceRead"
          [hasUpdatePermission]="hasServiceUpdate"
          [hasDeletePermission]="hasServiceDelete">
        </app-services>
      </div>

      <!-- CONTENT AREA - CUSTOMERS -->
      <div *ngIf="activeTab === 'CUSTOMERS'" class="flex flex-col h-full space-y-4">
        <div class="text-center py-12 text-muted-foreground">
          <p>Vista de clientes próximamente...</p>
        </div>
      </div>

    </ng-container>

  </div>
</main>
