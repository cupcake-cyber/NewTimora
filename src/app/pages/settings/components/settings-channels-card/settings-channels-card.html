<app-card>
  <app-card-content class="p-6">

    <h2 class="text-sm font-semibold text-foreground mb-0.5">
      Canales
    </h2>

    <p class="text-xs text-muted-foreground mb-4">
      Dónde recibir las notificaciones
    </p>

    <div class="divide-y divide-border">

      <div class="flex items-center justify-between py-3">
        <div>
          <div class="text-sm font-medium text-foreground">
            Notificaciones en app
          </div>
          <div class="text-xs text-muted-foreground">
            Recibir alertas dentro de la aplicación
          </div>
        </div>

        <button
          (click)="toggle.emit('appChannelEnabled')"
          class="relative rounded-full transition-colors shrink-0"
          [class.bg-primary]="config.appChannelEnabled"
          [class.bg-switch]="!config.appChannelEnabled"
          style="width: 40px; height: 22px;"
        >
          <div
            class="absolute top-0.5 rounded-full bg-white shadow transition-transform"
            style="width: 18px; height: 18px;"
            [style.transform]="config.appChannelEnabled ? 'translateX(20px)' : 'translateX(2px)'"
          ></div>
        </button>
      </div>

      <div class="flex items-center justify-between py-3">
        <div>
          <div class="text-sm font-medium text-foreground">
            Notificaciones por email
          </div>
          <div class="text-xs text-muted-foreground">
            Recibir alertas por correo electrónico
          </div>
        </div>

        <button
          (click)="toggle.emit('emailChannelEnabled')"
          class="relative rounded-full transition-colors shrink-0"
          [class.bg-primary]="config.emailChannelEnabled"
          [class.bg-switch]="!config.emailChannelEnabled"
          style="width: 40px; height: 22px;"
        >
          <div
            class="absolute top-0.5 rounded-full bg-white shadow transition-transform"
            style="width: 18px; height: 18px;"
            [style.transform]="config.emailChannelEnabled ? 'translateX(20px)' : 'translateX(2px)'"
          ></div>
        </button>
      </div>

    </div>

  </app-card-content>
</app-card>
