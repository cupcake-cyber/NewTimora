<main class="flex-1 overflow-auto p-6 noscroll">

  <div class="space-y-5 max-w-2xl">

    <!-- HEADER -->
    <app-settings-header></app-settings-header>

    <!-- NOTIFICATIONS -->
    <app-settings-notifications-card>
      [config]="config"
      (toggle)="toggle($event)">
    </app-settings-notifications-card>

    <!-- CHANNELS -->
    <app-settings-channels-card>
      [config]="config"
      (toggle)="toggle($event)">
    </app-settings-channels-card>

    <!-- APPEARANCE -->
    <app-settings-appearance-card>
      [config]="config"
      (toggle)="toggle($event)"
      (updateReminder)="updateReminder($event)">
    </app-settings-appearance-card>

  </div>

</main>
