<main class="flex-1 overflow-auto p-6">
  <div class="space-y-5 max-w-2xl">

    <app-company-header></app-company-header>

    <app-company-feedback
      [loading]="loading"
      [error]="error"
      [company]="company"
      [icons]="icons"
      (retry)="loadCompany()">
    </app-company-feedback>

    <app-company-form
      *ngIf="company && !loading"
      [company]="company"
      [editForm]="editForm"
      [validationErrors]="validationErrors"
      [saving]="saving"
      [saveSuccess]="saveSuccess"
      [icons]="icons"
      [formValid]="isFormValid()"
      (save)="saveChanges()">
    </app-company-form>

  </div>
</main>
