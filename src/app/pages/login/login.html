<div class="min-h-screen bg-background flex items-center justify-center p-6">

  <div class="w-full max-w-lg">

    <!-- HEADER -->
    <div class="text-center mb-10">

      <!-- LOGO CON GLOW -->
      <div class="relative w-14 h-14 mx-auto mb-4">

        <!-- glow -->
        <div class="absolute inset-0 rounded-2xl bg-primary/40 blur-xl"></div>

        <!-- icon box -->
        <div class="relative w-14 h-14 rounded-2xl bg-primary
                    flex items-center justify-center
                    shadow-lg shadow-primary/30">

          <svg xmlns="http://www.w3.org/2000/svg"
               width="26"
               height="26"
               viewBox="0 0 24 24"
               fill="none"
               stroke="currentColor"
               stroke-width="2"
               stroke-linecap="round"
               stroke-linejoin="round"
               class="text-primary-foreground">

            <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            <rect width="20" height="14" x="2" y="6" rx="2"></rect>

          </svg>

        </div>
      </div>

      <h1 class="text-3xl font-bold text-foreground tracking-tight">
        Timora
      </h1>

      <p class="text-muted-foreground mt-1.5">
        Plataforma de Reservaciones & Citas
      </p>

    </div>

    <!-- CARD -->
    <app-card>

      <app-card-content class="px-2 py-8">

        <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">

          <app-input
            formControlName="email"
            type="email"
            placeholder="Email">
          </app-input>

          <app-input
            formControlName="password"
            type="password"
            placeholder="Password">
          </app-input>

          <app-button type="submit" class="w-full mt-6">
            Iniciar sesión
          </app-button>

          <p *ngIf="errorMessage" class="text-sm text-destructive text-left mt-2">
            {{ errorMessage }}
          </p>

        </form>

      </app-card-content>

    </app-card>


    <p class="text-center text-xs text-muted-foreground mt-5">
      WGdev Studio · Trujillo, Perú · App
    </p>

  </div>

</div>
